name: Daily Africa Brief

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no email, no persistence)'
        required: false
        default: 'false'

concurrency:
  group: daily-africa-brief
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          DIGEST_TO:         ${{ secrets.DIGEST_TO }}
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            python run.py --dry-run
          else
            python run.py
          fi

      - name: Commit artifacts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "africa-digest-bot"
          git config user.email "africa-digest-bot@users.noreply.github.com"
          git add public/ README.md trackers/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "daily: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
